spring.application.name=bonos-api-backend

# JPA común
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Inicialización
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# DATABASE
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bonos}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# conexión keepalive
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1

# JWT
app.jwt.secret=EstaEsUnaClaveSuperSecretaParaFirmarLosTokensDeMiApi12345678901234567890
app.jwt.expiration-ms=3600000

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}